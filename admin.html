<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Death Row</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }

.hidden { display:none; }

input, textarea {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button {
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

.news-item {
    background:white;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h1>Admin Login</h1>
<input type="password" id="password" placeholder="Wachtwoord">
<button onclick="login()">Inloggen</button>
<p id="error" style="color:red;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">

<h1>Nieuws beheren</h1>

<input type="text" id="title" placeholder="Titel">
<textarea id="text" placeholder="Nieuws tekst"></textarea>

<button onclick="addNews()">Toevoegen</button>

<h2>Bestaande berichten</h2>
<div id="newsList"></div>

</div>

<script>

// 🔐 WACHTWOORD HIER INSTELLEN
const ADMIN_PASSWORD = "deathrow123";

// LOGIN
function login(){
    let input = document.getElementById("password").value;

    if(input === ADMIN_PASSWORD){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadAdmin();
    } else {
        document.getElementById("error").innerText="Fout wachtwoord!";
    }
}

// STORAGE
function getNews(){
    return JSON.parse(localStorage.getItem("news")) || [];
}

function saveNews(news){
    localStorage.setItem("news", JSON.stringify(news));
}

// ADD
function addNews(){
    let title = document.getElementById("title").value;
    let text = document.getElementById("text").value;

    if(!title || !text){
        alert("Vul alles in!");
        return;
    }

    let news = getNews();
    news.push({title, text});
    saveNews(news);

    document.getElementById("title").value="";
    document.getElementById("text").value="";

    loadAdmin();
}

// DELETE
function deleteNews(index){
    let news = getNews();
    news.splice(index,1);
    saveNews(news);
    loadAdmin();
}

// LOAD
function loadAdmin(){
    let news = getNews();
    let container = document.getElementById("newsList");
    container.innerHTML="";

    news.forEach((item, index)=>{
        let div = document.createElement("div");
        div.className="news-item";
        div.innerHTML = `
            <h3>${item.title}</h3>
            <p>${item.text}</p>
            <button onclick="deleteNews(${index})">Verwijderen</button>
        `;
        container.appendChild(div);
    });
}

</script>

</body>
</html>
